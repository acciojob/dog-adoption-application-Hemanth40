<!DOCTYPE html>

<html>

<head>
	<title>Dog Adoption Application</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form>

    <h2>Dog Adoption Application</h2>

    <label for="name">Name:</label><br>
    <input type="text" id="name" placeholder="Name"><br><br>

    <label for="phone">Phone Number:</label><br>
    <input type="text" id="phone" placeholder="Phone Number"><br><br>

    <label for="address">Address:</label><br>
    <input type="text" id="address" placeholder="Address"><br><br>

    <label>
      <input type="checkbox" value="Have you ever lived with a Dog before?">
      Have you ever lived with a Dog before?
    </label><br><br>

    <label for="breeds">Please select your preferred breeds:</label><br>
    <select id="breeds" multiple>
      <option>Golden Retriever</option>
      <option>Poodle</option>
      <option>German Shepherd</option>
    </select><br><br>

    <input type="submit" value="Submit">

  </form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
